<!DOCTYPE html>
<html>
<head>

<title>SRM EV Facility</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;

background:
linear-gradient(rgba(12,40,90,0.85), rgba(40,90,160,0.9)),
url("srm-logo.png");

background-size:420px;
background-repeat:no-repeat;
background-position:center;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(15px);
padding:45px;
border-radius:20px;
width:340px;
text-align:center;
color:white;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

.icon{
font-size:42px;
margin-bottom:10px;
}

h1{
font-size:26px;
margin-bottom:6px;
}

h2{
font-size:18px;
font-weight:300;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:8px;
border:none;
outline:none;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:15px;
font-size:18px;
border:none;
border-radius:8px;
background:white;
color:#2a5298;
font-weight:bold;
cursor:pointer;
}

#msg{
margin-top:15px;
font-size:18px;
color:#ffdede;
}

#counter{
margin-top:10px;
font-size:22px;
font-weight:bold;
}

</style>

<script>

function startCountdown(){

let count = 15;

document.getElementById("counter").innerHTML = count;

let timer = setInterval(function(){

count--;

document.getElementById("counter").innerHTML = count;

if(count <= 0){

clearInterval(timer);

location.reload();

}

},1000);

}

function sendCommand(value){

fetch("https://api.thingspeak.com/update?api_key=F7T3NXT27WBZT5R1&field1="+value);

document.getElementById("msg").innerHTML =
"EV request initiated. Please wait...";

startCountdown();

}

function checkPassword(){

var password=document.getElementById("pass").value;

if(password==="google123"){

sendCommand(500);

}

else if(password==="facebook123"){

sendCommand(700);

}

else{

location.reload();

}

}

function handleKey(event){

if(event.key==="Enter"){
checkPassword();
}

}

</script>

</head>

<body>

<div class="card">

<div class="icon">⚡🚗</div>

<h1>SRM University AP</h1>
<h2>EV Facility for Staff & Faculty</h2>

<input type="password"
id="pass"
placeholder="Enter Access Password"
onkeypress="handleKey(event)">

<button onclick="checkPassword()">Access</button>

<p id="msg"></p>

<div id="counter"></div>

</div>

</body>
</html>
